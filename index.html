<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warm Cafe - Visual Novel</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cafe-dark: #6F4E37;
            --cafe-medium: #A67B5B;
            --cafe-bg: #FFF8E1;
            --glass-bg: rgba(255, 255, 255, 0.9);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Mali', cursive; overflow: hidden; background-color: var(--cafe-bg);
        }

        #game-container {
            position: relative; width: 100%; height: 100vh;
            background-image: url('https://www.pinterest.com/pin/10414642882596365/');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
        }

        #character-sprite {
            height: 75vh; z-index: 1; display: none;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
            transition: opacity 0.5s ease;
        }

        #dialogue-box {
            position: relative; width: 90%; max-width: 800px; min-height: 140px;
            background: var(--glass-bg); border: 4px solid var(--cafe-medium);
            border-radius: 20px; margin-bottom: 20px; padding: 25px;
            z-index: 2; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        #name-tag {
            position: absolute; top: -20px; left: 30px;
            background: var(--cafe-dark); color: white;
            padding: 5px 25px; border-radius: 12px; font-size: 1.2rem;
        }

        #text-content { font-size: 1.15rem; line-height: 1.6; color: var(--cafe-dark); }

        /* Choices Container - จะซ่อนไว้จนกว่าข้อความจะพิมพ์จบ */
        #choices-container {
            position: absolute; top: 58%; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            gap: 15px; z-index: 3; opacity: 0; transition: opacity 0.5s ease;
        }

        .choice-btn {
            background: var(--glass-bg); border: 2px solid var(--cafe-medium);
            padding: 12px 30px; border-radius: 30px; cursor: pointer;
            font-family: 'Mali', cursive; font-size: 1rem; color: var(--cafe-dark);
            width: 280px; text-align: center; transition: all 0.2s;
        }

        .choice-btn:hover { background: var(--cafe-medium); color: white; transform: scale(1.03); }

        /* Guestbook Styles */
        #guestbook-form {
            display: none; background: #fdf5e6; padding: 25px;
            border-radius: 5px; width: 85%; max-width: 380px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
            border: 1px solid #d2b48c; z-index: 10;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .input-field {
            width: 100%; padding: 10px; margin-bottom: 15px;
            border: 1px solid #d2b48c; border-radius: 5px;
            font-family: 'Mali', cursive; box-sizing: border-box;
        }

        textarea {
            width: 100%; height: 120px; border: none; background: transparent;
            background-image: linear-gradient(#eee 1px, transparent 1px);
            background-size: 100% 1.5em; line-height: 1.5em;
            font-family: 'Mali', cursive; resize: none; outline: none;
        }

        .submit-btn {
            background: var(--cafe-dark); color: white; border: none;
            padding: 12px; border-radius: 8px; cursor: pointer; width: 100%;
            font-family: 'Mali', cursive; margin-top: 10px;
        }

        @media (max-width: 600px) { #character-sprite { height: 55vh; } }
    </style>
</head>
<body>

<div id="game-container">
    <img id="character-sprite" src="https://otomeology.b-cdn.net/wp-content/uploads/2023/01/Jude-copy-e1673828332892.png" alt="Barista">

    <div id="guestbook-form">
        <h3 style="text-align:center; color:#6F4E37; margin-top:0;">📖 สมุดอวยพร</h3>
        <label style="font-size: 0.9rem; color: #8b4513;">จากคุณ:</label>
        <input type="text" id="visitor-name" class="input-field" placeholder="ใส่ชื่อของคุณที่นี่...">
        <label style="font-size: 0.9rem; color: #8b4513;">คำอวยพร:</label>
        <textarea id="wish-text" placeholder="เขียนความรู้สึกดีๆ ให้พนักงาน..."></textarea>
        <button class="submit-btn" onclick="submitWish()">ส่งมอบด้วยความยินดี ✨</button>
    </div>

    <div id="choices-container"></div>

    <div id="dialogue-box">
        <div id="name-tag">???</div>
        <div id="text-content"></div>
    </div>
</div>

<script>
    const textElement = document.getElementById('text-content');
    const nameTag = document.getElementById('name-tag');
    const choicesContainer = document.getElementById('choices-container');
    const charSprite = document.getElementById('character-sprite');
    const guestbook = document.getElementById('guestbook-form');

    let isTyping = false;
    let typeSpeed = 40; // ความเร็วในการพิมพ์ (ms)

    const story = {
        'start': {
            name: 'ระบบ',
            text: 'ในขณะที่คุณเหนื่อยล้าและกำลังมองหาที่นั่งพักใจสักที่ คุณก็พบกับร้านกาแฟแห่งหนึ่ง เป็นร้านกาแฟที่มองแล้วชวนให้รู้สึกอบอุ่นใจ...',
            choices: [{ text: 'ตัดสินใจเดินเข้าไป', next: 'enter_cafe' }]
        },
        'enter_cafe': {
            name: 'ระบบ',
            text: 'กลิ่นหอมของเมล็ดกาแฟคั่วอบอวลไปทั่วร้าน คุณมองหาที่นั่งที่ถูกใจ...',
            choices: [
                { text: 'นั่งริมหน้าต่าง', next: 'meet_staff' },
                { text: 'นั่งตรงเคาน์เตอร์บาร์', next: 'meet_staff' },
                { text: 'นั่งตรงมุมร้าน', next: 'meet_staff' }
            ]
        },
        'meet_staff': {
            name: 'พนักงานชาย',
            showChar: true,
            text: 'ยินดีต้อนรับครับคุณลูกค้า วันนี้บรรยากาศดีจังเลยนะครับ เลือกที่นั่งได้ตามสบายเลยครับ!',
            choices: [
                { text: 'พูดคุยกับเขา', next: 'order_drink' },
                { text: 'เมินแล้วดูเมนูต่อไป', next: 'order_drink' }
            ]
        },
        'order_drink': {
            name: 'พนักงานชาย',
            showChar: true,
            text: 'วันนี้รับเครื่องดื่มอะไรดีครับ?',
            choices: [
                { text: 'ลาเต้', next: 'drink_served' },
                { text: 'อเมริกาโน', next: 'drink_served' },
                { text: 'มัทฉะลาเต้', next: 'drink_served' },
                { text: 'ชาผลไม้', next: 'drink_served' },
                { text: 'อิตาเลียนโซดา', next: 'drink_served' }
            ]
        },
        'drink_served': {
            name: 'พนักงานชาย',
            showChar: true,
            text: 'นี่ครับเครื่องดื่มที่สั่ง... รู้ไหมครับว่าเครื่องดื่มบอกนิสัยคนดื่มได้ด้วยนะ อยากรู้ไหมครับ?',
            choices: [
                { text: 'อยากรู้จัง', next: 'birthday_reveal' },
                { text: 'ไม่อยากรู้หรอก', next: 'birthday_reveal' }
            ]
        },
        'birthday_reveal': {
            name: 'พนักงานชาย',
            showChar: true,
            text: 'จริงๆ แล้ววันนี้เป็นวันเกิดของผมเองครับ เครื่องดื่มแก้วนี้ผมเลี้ยงเอง คุณไม่ต้องจ่ายเงินนะครับ!',
            choices: [
                { text: 'อวยพรวันเกิดให้เขา', next: 'show_guestbook' },
                { text: 'กล่าวขอบคุณตามปกติ', next: 'end_normal' }
            ]
        },
        'show_guestbook': {
            name: 'พนักงานชาย',
            showChar: true,
            text: 'จริงเหรอครับ? ถ้าอย่างนั้น... ช่วยเขียนชื่อและคำอวยพรลงในสมุดเล่มนี้ให้ผมหน่อยได้ไหมครับ?',
            isGuestbook: true,
            choices: []
        },
        'end_normal': {
            name: 'พนักงานชาย',
            showChar: true,
            text: 'ไม่เป็นไรเลยครับ แค่คุณแวะมาทานที่ร้านผมก็ดีใจแล้ว ขอให้มีวันที่ดีนะครับ!',
            choices: [{ text: 'เริ่มใหม่', next: 'start' }]
        },
        'final_happy': {
            name: 'พนักงานชาย',
            showChar: true,
            text: 'ขอบคุณจริงๆ ครับคุณ (NAME)! ผมจะเก็บคำอวยพรนี้ไว้อย่างดีเลย ขอให้เป็นวันที่อบอุ่นสำหรับคุณเช่นกันนะครับ',
            choices: [{ text: 'จบการสนทนา (เริ่มใหม่)', next: 'start' }]
        }
    };

    function typeWriter(text, i, callback) {
        if (i < text.length) {
            textElement.innerHTML += text.charAt(i);
            setTimeout(() => typeWriter(text, i + 1, callback), typeSpeed);
        } else {
            isTyping = false;
            if (callback) callback();
        }
    }

    function updateScene(stateKey) {
        if (isTyping) return; // ป้องกันการกดรัวขณะกำลังพิมพ์

        const state = story[stateKey];
        
        // ล้างค่าและซ่อนส่วนต่างๆ
        choicesContainer.style.opacity = '0';
        choicesContainer.innerHTML = '';
        guestbook.style.display = 'none';
        textElement.innerHTML = '';
        
        nameTag.innerText = state.name;
        charSprite.style.display = state.showChar ? 'block' : 'none';
        
        isTyping = true;
        
        // จัดการเนื้อเรื่องที่ต้องใส่ชื่อผู้เล่น
        let displayType = state.text;
        const vName = document.getElementById('visitor-name').value || "คุณลูกค้า";
        displayType = displayType.replace("(NAME)", vName);

        typeWriter(displayType, 0, () => {
            // เมื่อพิมพ์จบ ให้แสดงตัวเลือกหรือสมุด
            if (state.isGuestbook) {
                guestbook.style.display = 'block';
            } else {
                state.choices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.innerText = choice.text;
                    btn.onclick = () => updateScene(choice.next);
                    choicesContainer.appendChild(btn);
                });
                choicesContainer.style.opacity = '1';
            }
        });
    }

    function submitWish() {
        const name = document.getElementById('visitor-name').value;
        const wish = document.getElementById('wish-text').value;
        
        if(!name || !wish) {
            alert("กรุณาใส่ชื่อและคำอวยพรให้หน่อยนะครับ...");
            return;
        }
        updateScene('final_happy');
    }

    updateScene('start');
</script>

</body>
</html>
